<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Sorteos - Herramientas Libres</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        @media (min-width: 640px) {
            .number-grid { grid-template-columns: repeat(10, 1fr); }
        }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20">

    <div id="app" class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-indigo-700 leading-tight">Gestor de Sorteos</h1>
                <p class="text-slate-500 font-medium">Herramientas Libres - Manager</p>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <button onclick="toggleConfig()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-white border border-slate-200 px-4 py-2 rounded-xl shadow-sm hover:bg-slate-50 transition font-semibold">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    Configurar
                </button>
                <button onclick="copyToWhatsApp()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-green-600 text-white px-4 py-2 rounded-xl shadow-md hover:bg-green-700 transition font-bold">
                    <i data-lucide="share-2" class="w-5 h-5"></i>
                    Compartir
                </button>
            </div>
        </header>

        <!-- Config Panel -->
        <div id="configPanel" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <h3 class="text-sm font-black text-indigo-600 uppercase mb-4 flex items-center gap-2">
                <i data-lucide="settings" class="w-4 h-4"></i> Ajustes del Sorteo
            </h3>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Premio</label>
                    <input id="inTitle" type="text" value="Taladro + Amoladora" class="w-full p-2 bg-slate-50 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Precio $</label>
                    <input id="inPrice" type="number" value="4000" class="w-full p-2 bg-slate-50 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Lotería</label>
                    <input id="inLottery" type="text" value="Quiniela Correntina" class="w-full p-2 bg-slate-50 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Alias Pago</label>
                    <input id="inAlias" type="text" value="herramientaslibres" class="w-full p-2 bg-slate-50 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Titular</label>
                    <input id="inOwner" type="text" value="Emilio Di Tella" class="w-full p-2 bg-slate-50 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Modalidad</label>
                    <select id="inMode" class="w-full p-2 bg-slate-50 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="100">100 Números (Indiv)</option>
                        <option value="50">50 Números (Pares)</option>
                    </select>
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-xs font-bold text-slate-400 uppercase block">Fotos del Producto</label>
                <div id="imgContainer" class="flex flex-wrap gap-3">
                    <label class="w-20 h-20 flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-xl cursor-pointer hover:bg-slate-50 transition text-slate-400">
                        <i data-lucide="plus" class="w-6 h-6"></i>
                        <span class="text-[10px] font-bold mt-1">Subir</span>
                        <input type="file" class="hidden" accept="image/*" multiple onchange="handleImages(this)">
                    </label>
                </div>
            </div>

            <div class="mt-6 pt-6 border-t border-slate-100 flex justify-end">
                <button onclick="showResetModal()" class="text-red-500 flex items-center gap-1 text-xs font-bold hover:bg-red-50 px-3 py-1 rounded-full transition">
                    <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> Reiniciar Todo
                </button>
            </div>
        </div>

        <!-- Gallery -->
        <div id="gallery" class="mb-8 flex gap-4 overflow-x-auto pb-2 hide-scroll"></div>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-3 mb-8">
            <div class="bg-indigo-600 text-white p-4 rounded-2xl shadow-md">
                <p class="text-indigo-100 text-[10px] font-black uppercase tracking-wider">Caja</p>
                <p id="statCash" class="text-xl font-black">$0</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-wider">Ventas</p>
                <p id="statSold" class="text-xl font-black text-green-600">0</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-wider">Libres</p>
                <p id="statFree" class="text-xl font-black text-slate-700">100</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Grid -->
            <div class="lg:col-span-2">
                <h2 class="text-sm font-black text-slate-400 uppercase mb-4 flex items-center gap-2">
                    <i data-lucide="ticket" class="w-4 h-4 text-indigo-600"></i> Tablero
                </h2>
                <div id="numberGrid" class="number-grid bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                    <!-- Numbers injected by JS -->
                </div>
            </div>

            <!-- Side Panel -->
            <div class="space-y-6">
                <div id="salePanel" class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm sticky top-8">
                    <h3 class="text-sm font-black text-slate-400 uppercase mb-4 flex items-center gap-2">
                        <i data-lucide="user" class="w-4 h-4 text-indigo-600"></i> Detalle
                    </h3>
                    <div id="saleContent">
                        <div class="text-center py-10 px-4 text-slate-300 border-2 border-dashed border-slate-50 rounded-2xl">
                            <i data-lucide="mouse-pointer-2" class="w-8 h-8 mx-auto mb-2 opacity-20"></i>
                            <p class="text-xs font-bold">Toca un número para venderlo</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="notif" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 hidden animate-bounce">
        <div class="bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-2">
            <i data-lucide="check-circle-2" class="w-5 h-5 text-green-400"></i>
            <span id="notifText" class="text-sm font-medium"></span>
        </div>
    </div>

    <!-- Modal -->
    <div id="resetModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-xl">
            <div class="text-red-600 mb-4 flex items-center gap-2 font-bold">
                <i data-lucide="alert-circle"></i> ¿Borrar todo?
            </div>
            <p class="text-sm text-slate-500 mb-6">Se perderán todos los nombres y fotos del sorteo actual.</p>
            <div class="flex gap-2">
                <button onclick="resetAll()" class="flex-1 bg-red-600 text-white py-2 rounded-lg font-bold">Sí, borrar</button>
                <button onclick="hideResetModal()" class="flex-1 bg-slate-100 py-2 rounded-lg">No</button>
            </div>
        </div>
    </div>

    <script>
        let numbers = Array.from({length: 100}, (_, i) => ({ id: i, buyer: '', sold: false }));
        let images = [];
        let selectedIdx = null;

        function init() {
            renderGrid();
            updateStats();
            lucide.createIcons();
        }

        function renderGrid() {
            const grid = document.getElementById('numberGrid');
            grid.innerHTML = '';
            numbers.forEach((n, i) => {
                const btn = document.createElement('button');
                btn.innerText = i.toString().padStart(2, '0');
                btn.className = `h-11 text-xs font-black rounded-xl transition-all border ${n.sold ? 'bg-green-100 text-green-700 border-green-200' : 'bg-slate-50 text-slate-400 border-slate-200 hover:border-indigo-400'}`;
                if (selectedIdx === i) btn.classList.add('ring-2', 'ring-indigo-500', 'scale-105', 'shadow-lg');
                btn.onclick = () => selectNumber(i);
                grid.appendChild(btn);
            });
        }

        function selectNumber(idx) {
            selectedIdx = idx;
            const mode = document.getElementById('inMode').value;
            const pairText = mode === '50' ? ` y ${(idx + 50) % 100}` : '';
            
            const panel = document.getElementById('saleContent');
            panel.innerHTML = `
                <div class="space-y-4">
                    <div class="bg-indigo-50 p-3 rounded-xl flex justify-between items-center">
                        <span class="text-indigo-600 text-[10px] font-bold uppercase">Nº Seleccionado</span>
                        <span class="text-2xl font-black text-indigo-700">${idx.toString().padStart(2, '0')}${pairText}</span>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Nombre Cliente</label>
                        <input id="buyerIn" type="text" value="${numbers[idx].buyer}" placeholder="Ej: Sergio Romero" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50 font-medium">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="saveSale()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-black shadow-md">Confirmar</button>
                        <button onclick="closePanel()" class="px-4 bg-slate-100 text-slate-400 rounded-xl">X</button>
                    </div>
                </div>
            `;
            renderGrid();
            document.getElementById('buyerIn').focus();
        }

        function saveSale() {
            const name = document.getElementById('buyerIn').value.trim();
            const mode = document.getElementById('inMode').value;
            
            numbers[selectedIdx].buyer = name;
            numbers[selectedIdx].sold = !!name;

            if (mode === '50') {
                const pair = (selectedIdx + 50) % 100;
                numbers[pair].buyer = name;
                numbers[pair].sold = !!name;
            }

            closePanel();
            updateStats();
            showNotif(name ? "Venta registrada" : "Número liberado");
        }

        function updateStats() {
            const soldCount = numbers.filter(n => n.sold).length;
            const price = document.getElementById('inPrice').value || 0;
            document.getElementById('statSold').innerText = soldCount;
            document.getElementById('statFree').innerText = 100 - soldCount;
            document.getElementById('statCash').innerText = '$' + (soldCount * price).toLocaleString();
        }

        function handleImages(input) {
            if (input.files) {
                Array.from(input.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        images.push(e.target.result);
                        renderGallery();
                    };
                    reader.readAsDataURL(file);
                });
            }
        }

        function renderGallery() {
            const gal = document.getElementById('gallery');
            const cont = document.getElementById('imgContainer');
            
            // Limpiar pero mantener el botón "Subir"
            const uploadBtn = cont.querySelector('label');
            cont.innerHTML = '';
            cont.appendChild(uploadBtn);
            gal.innerHTML = '';

            images.forEach((src, i) => {
                // Miniatura en config
                const div = document.createElement('div');
                div.className = "relative w-20 h-20 group";
                div.innerHTML = `<img src="${src}" class="w-full h-full object-cover rounded-xl border shadow-sm">
                                <button onclick="removeImg(${i})" class="absolute -top-2 -right-2 bg-red-500 text-white p-1 rounded-full shadow-lg"><i data-lucide="x" class="w-3 h-3"></i></button>`;
                cont.insertBefore(div, uploadBtn);

                // Imagen en galería principal
                const imgDiv = document.createElement('div');
                imgDiv.className = "shrink-0 w-48 h-32 rounded-2xl overflow-hidden shadow-md border border-white";
                imgDiv.innerHTML = `<img src="${src}" class="w-full h-full object-cover">`;
                gal.appendChild(imgDiv);
            });
            lucide.createIcons();
        }

        function removeImg(i) {
            images.splice(i, 1);
            renderGallery();
        }

        function copyToWhatsApp() {
            const title = document.getElementById('inTitle').value;
            const price = document.getElementById('inPrice').value;
            const lottery = document.getElementById('inLottery').value;
            const alias = document.getElementById('inAlias').value;
            const owner = document.getElementById('inOwner').value;
            const mode = document.getElementById('inMode').value;

            const sold = numbers.filter(n => n.sold).map(n => `${n.id.toString().padStart(2, '0')} ${n.buyer}`).join('\n');
            const free = numbers.filter(n => !n.sold).map(n => n.id.toString().padStart(2, '0')).join(' - ');

            const text = `📢 *SORTEO: ${title}*

💎 *Modalidad:* ${mode === '100' ? '100 números' : '50 números (pares)'}
♦️ *Sortea por:* ${lottery}
💰 *Valor:* $${price}
🏦 *Alias:* ${alias}
👤 *Titular:* ${owner}

📍 *VENDIDOS:*
${sold || 'Ninguno aún'}

📌 *DISPONIBLES:*
${free}

_¡Suerte para todos!_`;

            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showNotif("✅ Lista copiada para WhatsApp");
        }

        function toggleConfig() { document.getElementById('configPanel').classList.toggle('hidden'); }
        function closePanel() { selectedIdx = null; document.getElementById('saleContent').innerHTML = '<div class="text-center py-10 px-4 text-slate-300 border-2 border-dashed border-slate-50 rounded-2xl"><i data-lucide="mouse-pointer-2" class="w-8 h-8 mx-auto mb-2 opacity-20"></i><p class="text-xs font-bold">Toca un número para venderlo</p></div>'; renderGrid(); lucide.createIcons(); }
        function showNotif(msg) { const n = document.getElementById('notif'); document.getElementById('notifText').innerText = msg; n.classList.remove('hidden'); setTimeout(() => n.classList.add('hidden'), 3000); }
        function showResetModal() { document.getElementById('resetModal').classList.remove('hidden'); }
        function hideResetModal() { document.getElementById('resetModal').classList.add('hidden'); }
        function resetAll() { numbers = Array.from({length: 100}, (_, i) => ({ id: i, buyer: '', sold: false })); images = []; renderGrid(); renderGallery(); updateStats(); hideResetModal(); showNotif("Sorteo reiniciado"); }

        window.onload = init;
    </script>
</body>
</html>
